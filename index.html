<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣大哥大 成效儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; font-size: 14px; }

  .header { background: linear-gradient(135deg, #1677ff 0%, #0958d9 100%); color: white; padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-badge { background: rgba(255,255,255,0.2); border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 600; }
  .header-logo { height: 36px; width: auto; display: block; }
  .header-title h1 { font-size: 20px; font-weight: 700; }
  .header-title p { font-size: 12px; opacity: 0.8; margin-top: 2px; }
  .header-right { font-size: 12px; opacity: 0.85; text-align: right; line-height: 1.7; }

  .controls { background: white; border-bottom: 1px solid #e4e6ea; padding: 12px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .preset-btns { display: flex; gap: 6px; }
  .preset-btn { padding: 5px 14px; border: 1.5px solid #e4e6ea; border-radius: 20px; background: white; font-size: 12px; cursor: pointer; color: #555; transition: all 0.15s; font-weight: 500; }
  .preset-btn:hover { background: #e6f4ff; border-color: #1677ff; color: #1677ff; }
  .preset-btn.active { background: #1677ff; color: white; border-color: #1677ff; }
  .date-inputs { display: flex; align-items: center; gap: 6px; }
  .date-inputs input { padding: 5px 10px; border: 1.5px solid #e4e6ea; border-radius: 8px; font-size: 12px; outline: none; }
  .date-inputs input:focus { border-color: #1677ff; }
  .fetch-btn { padding: 7px 18px; background: #1677ff; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .fetch-btn:hover { background: #0958d9; }
  .fetch-btn:disabled { background: #aaa; cursor: not-allowed; }
  .status-text { font-size: 12px; color: #888; }
  .status-text.ok { color: #52c41a; }
  .status-text.err { color: #f5222d; }

  .main { padding: 20px 24px; max-width: 1500px; margin: 0 auto; }

  .loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.75); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
  .loading-overlay.show { display: flex; }
  .spinner { width: 40px; height: 40px; border: 4px solid #e4e6ea; border-top-color: #1677ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .sc { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .sc .lbl { font-size: 11px; color: #65676b; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
  .sc .val { font-size: 22px; font-weight: 700; }
  .sc .sub { font-size: 11px; color: #999; margin-top: 3px; }
  .c-blue .val { color: #1677ff; }
  .c-orange .val { color: #fa8c16; }
  .c-purple .val { color: #722ed1; }
  .c-teal .val { color: #13c2c2; }
  .c-pink .val { color: #eb2f96; }
  .c-green .val { color: #52c41a; }

  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 20px; }
  .charts-row-rev { grid-template-columns: 1fr 2fr; }
  .chart-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .chart-card h3 { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 14px; }
  .chart-wrap { position: relative; height: 220px; }

  .table-card { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); overflow: hidden; margin-bottom: 20px; }
  .table-header { padding: 14px 20px; border-bottom: 1px solid #f0f2f5; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .table-header h3 { font-size: 15px; font-weight: 600; }
  .table-header-right { display: flex; align-items: center; gap: 10px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { background: #f7f8fa; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: #65676b; padding: 16px 10px; text-align: right; white-space: normal; line-height: 1.4; vertical-align: bottom; min-width: 80px; border-bottom: 1px solid #e4e6ea; }
  th:first-child { text-align: left; min-width: 200px; }
  td { padding: 10px 14px; text-align: right; border-bottom: 1px solid #f5f5f5; font-size: 13px; white-space: nowrap; }
  td:first-child { text-align: left; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #e6f4ff; }
  .na { color: #ccc; }
  .spend-bar-wrap { display: flex; align-items: center; gap: 6px; justify-content: flex-end; }
  .spend-bar { height: 5px; border-radius: 3px; background: #1677ff; opacity: 0.55; min-width: 2px; }
  .cell-name { font-weight: 600; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

  th:first-child, td:first-child { position: sticky; left: 0; z-index: 2; background: inherit; }
  th:first-child { background: #f7f8fa; z-index: 3; }
  td:first-child { background: white; }
  tr:hover td:first-child { background: #e6f4ff; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <img class="header-logo" src="logo.png" alt="台灣大哥大">
    <div class="header-title">
      <h1>Meta 成效儀表板</h1>
      <p>帳戶 ID：1558628995676725 · TWD</p>
    </div>
  </div>
  <div class="header-right">
    最後更新：<span id="lastUpdate">—</span>
  </div>
</div>

<div class="controls">
  <div class="preset-btns">
    <button class="preset-btn" onclick="applyPreset(1)">今天</button>
    <button class="preset-btn" onclick="applyPresetYesterday()">昨天</button>
    <button class="preset-btn" id="preset7" onclick="applyPreset(7)">近7天</button>
    <button class="preset-btn" onclick="applyPreset(30)">近30天</button>
    <button class="preset-btn" onclick="applyPreset(90)">近90天</button>
    <button class="preset-btn" onclick="applyPresetMonth()">本月</button>
  </div>
  <div class="date-inputs">
    <input type="date" id="dateFrom" onchange="clearPreset()">
    <span style="color:#bbb">至</span>
    <input type="date" id="dateTo" onchange="clearPreset()">
  </div>
  <button class="fetch-btn" id="fetchBtn" onclick="fetchData(true)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
    更新資料
  </button>
  <span class="status-text" id="statusText"></span>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <span style="color:#555;font-size:14px;">正在從 Meta API 抓取資料…</span>
</div>

<div class="main">
  <div id="tab-perf">
    <div style="text-align:center;padding:60px;color:#aaa;">點擊「更新資料」開始載入</div>
  </div>
</div>

<script>
const API_BASE = 'https://twm-api-xa53.onrender.com';
const ACCOUNT_ID = '1558628995676725';
let trendChart, pieChart, ageChart, ageComboChart, genderChart, genderComboChart;
let lastFilteredTrend = [];
let lastTotal = null;
let dateGranularity = 'day';

function toYMD(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function clearPreset() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}
function applyPreset(days) {
  const to = new Date(), from = new Date();
  from.setDate(to.getDate() - days + 1);
  document.getElementById('dateFrom').value = toYMD(from);
  document.getElementById('dateTo').value = toYMD(to);
  clearPreset(); event.target.classList.add('active');
}
function applyPresetYesterday() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  document.getElementById('dateFrom').value = toYMD(d);
  document.getElementById('dateTo').value = toYMD(d);
  clearPreset(); event.target.classList.add('active');
}
function applyPresetMonth() {
  const now = new Date();
  document.getElementById('dateFrom').value = toYMD(new Date(now.getFullYear(), now.getMonth(), 1));
  document.getElementById('dateTo').value = toYMD(now);
  clearPreset(); event.target.classList.add('active');
}
(function() {
  const to = new Date(), from = new Date();
  from.setDate(to.getDate() - 6);
  document.getElementById('dateFrom').value = toYMD(from);
  document.getElementById('dateTo').value = toYMD(to);
  document.getElementById('preset7').classList.add('active');
  fetchData(false);
})();

async function fetchData(force = false) {
  const since = document.getElementById('dateFrom').value;
  const until = document.getElementById('dateTo').value;
  const btn = document.getElementById('fetchBtn');
  const status = document.getElementById('statusText');
  btn.disabled = true;
  document.getElementById('loadingOverlay').classList.add('show');
  status.textContent = '載入中…'; status.className = 'status-text';

  try {
    const f = force ? '&force=true' : '';
    const [campRes, trendRes, adsetRes, ageRes, genderRes] = await Promise.all([
      fetch(`${API_BASE}/api/insights?accounts=${ACCOUNT_ID}&since=${since}&until=${until}&level=campaign${f}`),
      fetch(`${API_BASE}/api/insights?accounts=${ACCOUNT_ID}&since=${since}&until=${until}&level=account&time_increment=daily${f}`),
      fetch(`${API_BASE}/api/insights?accounts=${ACCOUNT_ID}&since=${since}&until=${until}&level=adset${f}`),
      fetch(`${API_BASE}/api/insights?accounts=${ACCOUNT_ID}&since=${since}&until=${until}&level=account&breakdowns=age${f}`),
      fetch(`${API_BASE}/api/insights?accounts=${ACCOUNT_ID}&since=${since}&until=${until}&level=account&breakdowns=gender${f}`),
    ]);
    const campJson  = await campRes.json();
    const trendJson = await trendRes.json();
    const campData  = campJson.data || [];
    const trendData = trendJson.data || [];
    const adsetData = (await adsetRes.json()).data || [];
    const ageData   = (await ageRes.json()).data || [];
    const genderData = (await genderRes.json()).data || [];

    renderPerf(campData, trendData, adsetData, ageData, genderData, since, until);

    const updatedAt = campJson.updated || new Date().toLocaleString('zh-TW');
    document.getElementById('lastUpdate').textContent = updatedAt + (campJson.cached ? '（快取）' : '');
    status.textContent = `✓ 完成・${campData.length} campaigns`;
    status.className = 'status-text ok';
  } catch(e) {
    status.textContent = `❌ ${e.message}`; status.className = 'status-text err';
  } finally {
    btn.disabled = false;
    document.getElementById('loadingOverlay').classList.remove('show');
  }
}

function fmtN(n, d=0) { if (n == null || isNaN(n)) return '<span class="na">—</span>'; return (+n).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtM(n) { if (!n && n !== 0) return '<span class="na">—</span>'; return 'NT$'+Math.round(n).toLocaleString('zh-TW'); }
function fmtP(n) { if (n == null) return '<span class="na">—</span>'; return (+n).toFixed(2)+'%'; }

const PRODUCT_FIELDS = [
  { key: 'netflix_purchase', label: 'Netflix<br>Purchase' },
  { key: 'max_purchase',     label: 'Max<br>Purchase' },
  { key: 'newdp_purchase',   label: 'NewDP<br>Purchase' },
  { key: 'prime_purchase',   label: 'Prime<br>Purchase' },
  { key: 'ott_purchase',     label: 'OTT<br>Purchase' },
];

function renderPerf(camps, trend, adsets, ageRows, genderRows, since, until) {
  const total = camps.reduce((a,r) => ({
    spend: a.spend+(r.spend||0), impressions: a.impressions+(r.impressions||0),
    link_clicks: a.link_clicks+(r.link_clicks||0), view_content: a.view_content+(r.view_content||0),
    purchase: a.purchase+(r.purchase||0),
    netflix_purchase: a.netflix_purchase+(r.netflix_purchase||0),
    max_purchase: a.max_purchase+(r.max_purchase||0),
    newdp_purchase: a.newdp_purchase+(r.newdp_purchase||0),
    prime_purchase: a.prime_purchase+(r.prime_purchase||0),
    ott_purchase: a.ott_purchase+(r.ott_purchase||0),
  }), {spend:0,impressions:0,link_clicks:0,view_content:0,purchase:0,netflix_purchase:0,max_purchase:0,newdp_purchase:0,prime_purchase:0,ott_purchase:0});
  const cpa  = total.purchase > 0 ? total.spend/total.purchase : 0;
  const cplc = total.link_clicks > 0 ? total.spend/total.link_clicks : 0;
  const cpm  = total.impressions > 0 ? total.spend/total.impressions*1000 : 0;
  const sorted = [...camps].sort((a,b)=>(b.spend||0)-(a.spend||0));
  const maxSpend = sorted[0]?.spend || 1;

  document.getElementById('tab-perf').innerHTML = `
    <div class="summary-grid">
      <div class="sc c-blue"><div class="lbl">花費</div><div class="val">${fmtM(total.spend)}</div><div class="sub">${since} ～ ${until}</div></div>
      <div class="sc"><div class="lbl">曝光</div><div class="val">${(total.impressions/10000).toFixed(1)}萬</div><div class="sub">${total.impressions.toLocaleString()}</div></div>
      <div class="sc c-purple"><div class="lbl">連結點擊</div><div class="val">${total.link_clicks.toLocaleString()}</div><div class="sub">CTR ${fmtP(total.impressions?total.link_clicks/total.impressions*100:0)}</div></div>
      <div class="sc"><div class="lbl">CPLC</div><div class="val">${fmtM(cplc)}</div><div class="sub">花費 / 連結點擊</div></div>
      <div class="sc"><div class="lbl">CPM</div><div class="val">${fmtM(cpm)}</div><div class="sub">每千次曝光成本</div></div>
      <div class="sc c-orange"><div class="lbl">Apply頁面</div><div class="val">${Math.round(total.view_content).toLocaleString()}</div><div class="sub">內容瀏覽次數</div></div>
      <div class="sc c-teal"><div class="lbl">購買</div><div class="val">${Math.round(total.purchase).toLocaleString()}</div><div class="sub">Purchase</div></div>
      <div class="sc"><div class="lbl">CPA（購買）</div><div class="val">${fmtM(cpa)}</div><div class="sub">Cost per Purchase</div></div>
    </div>
    <div class="summary-grid">
      <div class="sc c-pink"><div class="lbl">Netflix_Purchase</div><div class="val">${Math.round(total.netflix_purchase).toLocaleString()}</div></div>
      <div class="sc c-pink"><div class="lbl">Max_Purchase</div><div class="val">${Math.round(total.max_purchase).toLocaleString()}</div></div>
      <div class="sc c-pink"><div class="lbl">NewDP_Purchase</div><div class="val">${Math.round(total.newdp_purchase).toLocaleString()}</div></div>
      <div class="sc c-pink"><div class="lbl">Prime_Purchase</div><div class="val">${Math.round(total.prime_purchase).toLocaleString()}</div></div>
      <div class="sc c-pink"><div class="lbl">OTT_Purchase</div><div class="val">${Math.round(total.ott_purchase).toLocaleString()}</div></div>
    </div>
    <div class="charts-row">
      <div class="chart-card">
        <h3>📅 每日趨勢</h3>
        <div style="display:flex;gap:16px;margin-bottom:8px;font-size:11px;">
          <span><span style="display:inline-block;width:12px;height:3px;background:#1677ff;border-radius:2px;vertical-align:middle;margin-right:4px"></span>花費</span>
          <span><span style="display:inline-block;width:12px;height:3px;background:#fa8c16;border-radius:2px;vertical-align:middle;margin-right:4px"></span>購買</span>
        </div>
        <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>📊 Campaign 花費佔比</h3>
        <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
      </div>
    </div>
    <div class="table-card">
      <div class="table-header">
        <h3>📅 日期成效</h3>
        <div class="table-header-right">
          <div class="preset-btns">
            <button class="preset-btn ${dateGranularity==='day'?'active':''}" onclick="setGranularity('day')">日</button>
            <button class="preset-btn ${dateGranularity==='week'?'active':''}" onclick="setGranularity('week')">週</button>
            <button class="preset-btn ${dateGranularity==='month'?'active':''}" onclick="setGranularity('month')">月</button>
          </div>
        </div>
      </div>
      <div class="table-wrap" id="dateTableWrap"></div>
    </div>
    <div class="table-card">
      <div class="table-header">
        <h3>👥 受眾表現（依廣告群組）</h3>
        <span style="font-size:12px;color:#aaa;">${adsets.length} 個廣告群組</span>
      </div>
      <div class="table-wrap" id="adsetTableWrap"></div>
    </div>
    <div class="charts-row charts-row-rev">
      <div class="chart-card">
        <h3>🎂 花費分佈（年齡）</h3>
        <div class="chart-wrap"><canvas id="ageChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>📊 花費／購買（年齡）</h3>
        <div class="chart-wrap"><canvas id="ageComboChart"></canvas></div>
      </div>
    </div>
    <div class="table-card">
      <div class="table-header"><h3>🎂 年齡分析</h3></div>
      <div class="table-wrap" id="ageTableWrap"></div>
    </div>
    <div class="charts-row charts-row-rev">
      <div class="chart-card">
        <h3>🚻 花費分佈（性別）</h3>
        <div class="chart-wrap"><canvas id="genderChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>📊 花費／購買（性別）</h3>
        <div class="chart-wrap"><canvas id="genderComboChart"></canvas></div>
      </div>
    </div>
    <div class="table-card">
      <div class="table-header"><h3>🚻 性別分析</h3></div>
      <div class="table-wrap" id="genderTableWrap"></div>
    </div>`;

  lastFilteredTrend = trend.filter(r => r.date_start >= since && r.date_start <= until);
  lastTotal = total;
  renderDateTable();
  renderAdsetTable(adsets);
  renderDemographic('age', ageRows);
  renderDemographic('gender', genderRows);

  if (trendChart) trendChart.destroy();
  if (pieChart)   pieChart.destroy();

  const filteredTrend = lastFilteredTrend;
  const tDates = filteredTrend.map(r => r.date_start);
  trendChart = new Chart(document.getElementById('trendChart'), {
    data: { labels: tDates, datasets: [
      { type:'bar',  label:'花費', data: filteredTrend.map(r=>r.spend||0),    backgroundColor:'rgba(22,119,255,0.25)', borderColor:'#1677ff', borderWidth:1, yAxisID:'y', borderRadius:3 },
      { type:'line', label:'購買', data: filteredTrend.map(r=>r.purchase||0), borderColor:'#fa8c16', borderWidth:2, pointRadius:2, tension:0.3, yAxisID:'y3' },
    ]},
    options: { responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false}, plugins:{legend:{display:false}},
      scales: {
        x:  { grid:{display:false}, ticks:{font:{size:10},maxTicksLimit:10} },
        y:  { position:'left',  beginAtZero:true, grid:{color:'#f0f2f5'}, ticks:{callback:v=>'NT$'+Math.round(v/1000)+'K',font:{size:10}} },
        y3: { position:'right', beginAtZero:true, grid:{display:false}, ticks:{font:{size:10}} },
      }
    }
  });

  const PIE_COLORS = ['#1677ff','#fa8c16','#52c41a','#eb2f96','#722ed1','#13c2c2','#fadb14','#f5222d'];
  pieChart = new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels: sorted.map(r=>r.campaign_name.slice(0,16)), datasets:[{data:sorted.map(r=>r.spend),backgroundColor:PIE_COLORS,borderWidth:2,borderColor:'white'}] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'right',labels:{font:{size:10},boxWidth:10,padding:6}}} }
  });
}

function aggregateByPeriod(rows, granularity) {
  if (granularity === 'day') {
    return [...rows].sort((a,b)=>a.date_start<b.date_start?-1:1).map(r => ({ ...r, label: r.date_start }));
  }
  const map = {};
  for (const r of rows) {
    const d = new Date(r.date_start + 'T00:00:00');
    let key, label;
    if (granularity === 'week') {
      const day = d.getDay();
      const monday = new Date(d); monday.setDate(d.getDate() + (day === 0 ? -6 : 1 - day));
      const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
      key = toYMD(monday);
      label = `${toYMD(monday).slice(5)} ~ ${toYMD(sunday).slice(5)}`;
    } else {
      key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      label = key;
    }
    if (!map[key]) map[key] = { label, date_start: key, spend:0, impressions:0, link_clicks:0, view_content:0, purchase:0,
      netflix_purchase:0, max_purchase:0, newdp_purchase:0, prime_purchase:0, ott_purchase:0 };
    const g = map[key];
    g.spend            += r.spend            || 0;
    g.impressions       += r.impressions       || 0;
    g.link_clicks       += r.link_clicks       || 0;
    g.view_content       += r.view_content       || 0;
    g.purchase          += r.purchase          || 0;
    g.netflix_purchase  += r.netflix_purchase  || 0;
    g.max_purchase      += r.max_purchase      || 0;
    g.newdp_purchase    += r.newdp_purchase    || 0;
    g.prime_purchase    += r.prime_purchase    || 0;
    g.ott_purchase      += r.ott_purchase      || 0;
  }
  return Object.keys(map).sort().map(k => {
    const g = map[k];
    return { ...g,
      ctr:  g.impressions > 0 ? g.link_clicks / g.impressions * 100 : 0,
      cplc: g.link_clicks > 0 ? g.spend / g.link_clicks : 0,
      cpm:  g.impressions > 0 ? g.spend / g.impressions * 1000 : 0,
      cpa:  g.purchase > 0 ? g.spend / g.purchase : 0,
    };
  });
}

function setGranularity(g) {
  dateGranularity = g;
  document.querySelectorAll('.table-header-right .preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderDateTable();
}

function renderDateTable() {
  const wrap = document.getElementById('dateTableWrap');
  if (!wrap || !lastTotal) return;
  const total = lastTotal;
  const periods = aggregateByPeriod(lastFilteredTrend, dateGranularity);
  const maxSpend = Math.max(...periods.map(r=>r.spend||0), 1);

  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th>日期</th><th>花費</th><th>佔比</th><th>曝光</th><th>CTR</th>
        <th>連結點擊</th><th>CPLC</th><th>CPM</th><th>Apply<br>頁面</th><th>購買</th><th>CPA</th>
        ${PRODUCT_FIELDS.map(p=>`<th>${p.label}</th>`).join('')}
      </tr></thead>
      <tbody>${periods.map(r => {
        const pct = total.spend > 0 ? (r.spend/total.spend*100).toFixed(1) : '0';
        const bw = Math.round((r.spend||0)/maxSpend*80);
        return `<tr>
          <td><span class="cell-name">${r.label}</span></td>
          <td>${fmtM(r.spend)}</td>
          <td><div class="spend-bar-wrap"><span style="font-size:11px;color:#888">${pct}%</span><div class="spend-bar" style="width:${bw}px"></div></div></td>
          <td>${fmtN(r.impressions)}</td><td>${fmtP(r.ctr)}</td>
          <td>${fmtN(r.link_clicks)}</td><td>${fmtM(r.cplc)}</td><td>${fmtM(r.cpm)}</td>
          <td>${fmtN(r.view_content)}</td><td>${fmtN(r.purchase)}</td>
          <td>${fmtM(r.cpa)}</td>
          ${PRODUCT_FIELDS.map(p=>`<td>${fmtN(r[p.key])}</td>`).join('')}
        </tr>`;
      }).join('')}
      <tr style="background:#f0f4ff;font-weight:700;border-top:2px solid #d0d9f0;">
        <td>合計</td>
        <td>${fmtM(total.spend)}</td>
        <td></td>
        <td>${fmtN(total.impressions)}</td>
        <td>${fmtP(total.link_clicks && total.impressions ? total.link_clicks/total.impressions*100 : 0)}</td>
        <td>${fmtN(total.link_clicks)}</td>
        <td>${fmtM(total.link_clicks ? total.spend/total.link_clicks : 0)}</td>
        <td>${fmtM(total.impressions ? total.spend/total.impressions*1000 : 0)}</td>
        <td>${fmtN(total.view_content)}</td>
        <td>${fmtN(total.purchase)}</td>
        <td>${fmtM(total.purchase ? total.spend/total.purchase : 0)}</td>
        ${PRODUCT_FIELDS.map(p=>`<td>${fmtN(total[p.key])}</td>`).join('')}
      </tr>
      </tbody>
    </table>`;
}

function renderAdsetTable(adsets) {
  const wrap = document.getElementById('adsetTableWrap');
  if (!wrap) return;
  const sorted = [...adsets].sort((a,b)=>(b.spend||0)-(a.spend||0));
  const totalSpend = sorted.reduce((s,r)=>s+(r.spend||0), 0);
  const maxSpend = sorted[0]?.spend || 1;

  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th>廣告群組</th><th>花費</th><th>佔比</th><th>曝光</th><th>CTR</th>
        <th>連結點擊</th><th>CPLC</th><th>CPM</th><th>Apply<br>頁面</th><th>購買</th><th>CPA</th>
        ${PRODUCT_FIELDS.map(p=>`<th>${p.label}</th>`).join('')}
      </tr></thead>
      <tbody>${sorted.map(r => {
        const pct = totalSpend > 0 ? (r.spend/totalSpend*100).toFixed(1) : '0';
        const bw = Math.round((r.spend||0)/maxSpend*80);
        return `<tr>
          <td><span class="cell-name" title="${r.adset_name}">${r.adset_name||'—'}</span></td>
          <td>${fmtM(r.spend)}</td>
          <td><div class="spend-bar-wrap"><span style="font-size:11px;color:#888">${pct}%</span><div class="spend-bar" style="width:${bw}px"></div></div></td>
          <td>${fmtN(r.impressions)}</td><td>${fmtP(r.ctr)}</td>
          <td>${fmtN(r.link_clicks)}</td><td>${fmtM(r.cplc)}</td><td>${fmtM(r.cpm)}</td>
          <td>${fmtN(r.view_content)}</td><td>${fmtN(r.purchase)}</td>
          <td>${fmtM(r.cpa)}</td>
          ${PRODUCT_FIELDS.map(p=>`<td>${fmtN(r[p.key])}</td>`).join('')}
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;
}

const AGE_ORDER = ['18-24','25-34','35-44','45-54','55-64','65+'];
const GENDER_ORDER = ['male','female','unknown'];
const GENDER_LABELS = { male: '男性', female: '女性', unknown: '不明' };

function renderDemographic(kind, rows) {
  const isAge = kind === 'age';
  const order = isAge ? AGE_ORDER : GENDER_ORDER;
  const labelFor = r => isAge ? (r.age || '不明') : (GENDER_LABELS[r.gender] || '不明');
  const sorted = [...rows].sort((a,b) => {
    const av = isAge ? a.age : a.gender, bv = isAge ? b.age : b.gender;
    const ai = order.indexOf(av), bi = order.indexOf(bv);
    return (ai < 0 ? 999 : ai) - (bi < 0 ? 999 : bi);
  });
  const total = sorted.reduce((s,r)=>s+(r.spend||0), 0);
  const maxSpend = Math.max(...sorted.map(r=>r.spend||0), 1);

  const wrap = document.getElementById(kind + 'TableWrap');
  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th>${isAge ? '年齡' : '性別'}</th><th>花費</th><th>佔比</th><th>曝光</th><th>CTR</th>
        <th>連結點擊</th><th>CPLC</th><th>CPM</th><th>Apply<br>頁面</th><th>購買</th><th>CPA</th>
      </tr></thead>
      <tbody>${sorted.map(r => {
        const pct = total > 0 ? (r.spend/total*100).toFixed(1) : '0';
        const bw = Math.round((r.spend||0)/maxSpend*80);
        return `<tr>
          <td><span class="cell-name">${labelFor(r)}</span></td>
          <td>${fmtM(r.spend)}</td>
          <td><div class="spend-bar-wrap"><span style="font-size:11px;color:#888">${pct}%</span><div class="spend-bar" style="width:${bw}px"></div></div></td>
          <td>${fmtN(r.impressions)}</td><td>${fmtP(r.ctr)}</td>
          <td>${fmtN(r.link_clicks)}</td><td>${fmtM(r.cplc)}</td><td>${fmtM(r.cpm)}</td>
          <td>${fmtN(r.view_content)}</td><td>${fmtN(r.purchase)}</td>
          <td>${fmtM(r.cpa)}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>`;

  const PIE_COLORS = ['#1677ff','#fa8c16','#52c41a','#eb2f96','#722ed1','#13c2c2','#fadb14'];
  const labels = sorted.map(labelFor);

  if (isAge) { if (ageChart) ageChart.destroy(); if (ageComboChart) ageComboChart.destroy(); }
  else       { if (genderChart) genderChart.destroy(); if (genderComboChart) genderComboChart.destroy(); }

  const doughnut = new Chart(document.getElementById(kind + 'Chart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: sorted.map(r=>r.spend||0), backgroundColor: PIE_COLORS, borderWidth: 2, borderColor: 'white' }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10, padding: 6 } } } }
  });

  const combo = new Chart(document.getElementById(kind + 'ComboChart'), {
    data: { labels, datasets: [
      { type: 'bar',  label: '花費', data: sorted.map(r=>r.spend||0),    backgroundColor: 'rgba(22,119,255,0.25)', borderColor: '#1677ff', borderWidth: 1, yAxisID: 'y', borderRadius: 3 },
      { type: 'line', label: '購買', data: sorted.map(r=>r.purchase||0), borderColor: '#fa8c16', borderWidth: 2, pointRadius: 3, tension: 0.3, yAxisID: 'y3' },
    ]},
    options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false }, plugins: { legend: { display: false } },
      scales: {
        x:  { grid: { display: false }, ticks: { font: { size: 10 } } },
        y:  { position: 'left',  beginAtZero: true, grid: { color: '#f0f2f5' }, ticks: { callback: v=>'NT$'+Math.round(v/1000)+'K', font: { size: 10 } } },
        y3: { position: 'right', beginAtZero: true, grid: { display: false }, ticks: { font: { size: 10 } } },
      }
    }
  });

  if (isAge) { ageChart = doughnut; ageComboChart = combo; }
  else       { genderChart = doughnut; genderComboChart = combo; }
}
